    <!-- Start Login -->
<div class="login-container">
    <div class="container">
        <div class="info-side">
            <img src="Images/logo2.png" alt="BloodLink Logo">
            <p>سجل دخولك لمتابعة طلبات التبرع والمساهمة في إنقاذ المزيد من الأرواح</p>
        </div>
        <div class="form-side">
            <h2>تسجيل الدخول</h2>
            <form action="">
                <div class="input-group">
                    <label class="mail">البريد الإلكتروني</label>
                    <div class="input-wrapper">
                        <input type="email" placeholder="البريد الإلكتروني">
                        <i class="far fa-envelope"></i>
                    </div>
                </div>
                <div class="input-group">
                    <label class="pass">كلمة المرور</label>
                    <div class="input-wrapper">
                        <input type="password" placeholder="كلمة المرور">
                        <i class="fas fa-lock"></i>
                    </div>
                </div>
                <a href="#" class="forgot">هل نسيت كلمة السر؟</a>
                <button type="submit">تسجيل الدخول <i class="fas fa-sign-in-alt"></i></button>
            </form>
        </div>
    </div>
</div>
