                </ul>
            </nav>
        </div>
    </header>
    <!-- End Header -->

    <!-- start request -->
    <div class="request-page">
        <div class="container">
            <div class="request-card">
                <div class="card-header">
                    <a href="index.html" class="btn-back">الرجوع</a>
                    <h2>استمارة طلب بالدم</h2>
                    <button type="submit" form="main-request-form" class="btn-submit">ارسال الاستماره</button>
                </div>

                <!-- Start Personal Data one -->
                <form id="main-request-form" class="card-body">
                    <div class="form-side personal-data">
                        <div class="input-group">
                            <label class="text3">الاسم كامل</label>
                            <input type="text" placeholder="الاسم رباعي">
                        </div>
                        
                        <div class="input-group">
                            <label class="text3">العمر</label>
                            <div class="age-inputs">
                                <input type="number" placeholder="يوم" required>
                                <input type="number" placeholder="شهر" required>
                                <input type="number" placeholder="سنة" required>
                            </div>
                        </div>

                        <div class="input-group">
                            <label class="text3">نوع الجنس</label>
                            <div class="radio-group">
                                <label class="radio-label"><input type="radio" name="gender" required> ذكر</label>
                                <label class="radio-label"><input type="radio" name="gender" > انثي</label>
                            </div>
                        </div>

                        <div class="input-group">
                            <label class="text3">العنوان بالتفصيل</label>
                            <input type="text" placeholder="المستشفى / المنطقة" required>
                        </div>

                        <div class="input-group">
                            <label class="text3">رقم الهاتف</label>
                            <div class="phone-input">
                                <input type="tel" placeholder="010xxxxxxx" required>
                                <i class="fas fa-phone"></i>
                            </div>
                        </div>
                    </div>

                    <!-- End Personal Data one -->
                    
                    <!-- start personal Data two -->
                    <div class="form-side blood-data">
                        <div class="input-group">
                            <label class="text">نوع فصيلة الدم</label>
                            <div class="blood-grid">
                                <label class="blood-item"><input type="radio" name="type" required> O-</label>
                                <label class="blood-item"><input type="radio" name="type"> O+</label>
                                <label class="blood-item"><input type="radio" name="type"> A-</label>
                                <label class="blood-item"><input type="radio" name="type"> A+</label>
                                <label class="blood-item"><input type="radio" name="type"> B-</label>
                                <label class="blood-item"><input type="radio" name="type"> B+</label>
                                <label class="blood-item"><input type="radio" name="type"> AB-</label>
                                <label class="blood-item"><input type="radio" name="type"> AB+</label>
                            </div>
                        </div>

                        <div class="input-group qty-section">
                            <label class="text2">عدد الاكياس المطلوبة</label>
                            <div class="qty-control">
                                <button type="button" class="plus">+</button>
                                <input type="number" value="0" min="0">
                                <button type="button" class="minus">-</button>
                            </div>
                        </div>
                    </div>
                    <!-- End personal Data two -->
                </form>
            </div>
        </div>
    </div>
    <!-- End request -->
